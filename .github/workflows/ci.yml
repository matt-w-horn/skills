name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate skill structure & paths
        run: python3 tools/validate_skills.py
      - name: Run skill tests
        run: ./tools/run_tests.sh
